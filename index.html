<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Task Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="project.css">

  </head>

  <body>
    <header>
      <img src="logo.png" class="logo-img">
      <div class="header-logo">
        Task Management
      </div>
      <div class="search-wrap" >
        <span class="search-icon" >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="currentColor" fill="none" stroke="#141B34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.5 9H6.5" />
            <path d="M2.5 14H6.5" />
            <path d="M2.5 4H18.5" />
            <path d="M18.5355 17.0355L21.5 20M20 13.5C20 10.7386 17.7614 8.5 15 8.5C12.2386 8.5 10 10.7386 10 13.5C10 16.2614 12.2386 18.5 15 18.5C17.7614 18.5 20 16.2614 20 13.5Z" />
          </svg>
        </span>
        <input type="text" id="searchInput" placeholder="Search tasks…" autocomplete="off" >
        <button class="search-clear" id="searchClear" title="Clear">✕</button>
      </div>
      <div class="header-right">
        <button class="theme-btn" id="themeBtn" title="Toggle theme">
          <span class="theme-btn-thumb" id="themeThumb">☀️</span>
        </button>
      </div>
    </header>

    <div class="main-wrap">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">Views</div>
        <button class="sidebar-btn active" data-filter="all" onclick="setFilterView('all', this)">All Tasks
          <span class="sb-count" id="cnt-all">0</span>
        </button>
        <button class="sidebar-btn" data-filter="today" onclick="setFilterView('today', this)">
          Due Today
          <span class="sb-count" id="cnt-today" style="background: #ff9900">0</span>
        </button>
        <button class="sidebar-btn" data-filter="overdue" onclick="setFilterView('overdue', this)">
          Overdue
          <span class="sb-count" id="cnt-overdue" style="background: #ff4545">0</span>
        </button>
        <div class="sidebar-divider"></div>
        <div class="sidebar-section">Categories</div>
        <button class="sidebar-btn" data-filter="cat_assignment" onclick="setFilterView('cat_assignment', this)">
          Assignment
          <span class="sb-count" id="cnt-cat_assignment">0</span>
        </button>
        <button class="sidebar-btn" data-filter="cat_personal" onclick="setFilterView('cat_personal', this)">
          Personal Goals
          <span class="sb-count" id="cnt-cat_personal">0</span>
        </button>
        <div id="customFiltersBtns"></div>
        <button class="add-filter-btn" onclick="openManageFilters()">
          <span>+</span> Add Your Filters
        </button>
        <div class="sidebar-divider"></div>
        <div class="sidebar-section">Sort By</div>
        <div class="sort-group">
          <select class="sort-select" id="sortSelect" onchange="sortTasks()">
            <option value="created">Date Created</option>
            <option value="deadline">Deadline</option>
            <option value="priority">Priority</option>
            <option value="name">Name (A-Z)</option>
          </select>
        </div>
      </aside>

      <main class="board" id="board">
        <div class="column col-start" id="col-start" ondragover="onDragOver(event, 'start')" ="onDrop(event, 'start')" ondragleave="onDragLeave(event)">
          <div class="col-header">
            <div class="col-title">
              To Start
              <span class="col-count" id="count-start">0</span>
            </div>
            <button class="col-add-btn" title="Add task" onclick="openAddTask('start')">
              Add
            </button>
          </div>
          <div class="col-body" id="body-start"></div>
        </div>

        <div class="column col-prog" ="col-prog" ondragover="onDragOver(event, 'progress')" ondrop="onDrop(event, 'progress')" ondragleave="onDragLeave(event)">
          <div class="col-header">
            <div class="col-title">
              In Progress
              <span class="col-count" id="count-progress">0</span>
            </div>
            <button class="col-add-btn" title="Add task" onclick="openAddTask('progress')">
              Add
            </button>
          </div>
          <div class="col-body" id="body-progress"></div>
        </div>

        <div class="column col-done" id="col-done" ondragover="onDragOver(event, 'completed')" ondrop="onDrop(event, 'completed')" ondragleave="onDragLeave(event)">
          <div class="col-header">
            <div class="col-title">
              Completed
              <span class="col-count" id="count-completed">0</span>
            </div>
            <button class="col-add-btn" title="Add task" onclick="openAddTask('completed')">
              Add
            </button>
          </div>
          <div class="col-body" id="body-completed"></div>
        </div>
      </main>
    </div>

    <div class="overlay" id="taskModal" style="display: none" onclick="closeModalOnOverlay(event, 'taskModal')">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <span class="modal-title" id="taskModalTitle">New Task</span>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Task Name *</label>
            <input class="form-input" id="taskName" placeholder="Enter task name…" maxlength="120" >
          </div>
          <div class="form-group">
            <label class="form-label">
              Description
              <span style="font-weight: 400; color: var(--text3)">(optional)</span>
            </label>
            <textarea class="form-textarea" id="taskDesc" placeholder="Add a description…"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Status</label>
              <select class="form-select" id="taskStatus">
                <option value="start">To Start</option>
                <option value="progress">In Progress</option>
                <option value="completed">Completed</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Priority</label>
              <select class="form-select" id="taskPriority">
                <option value="low">Low</option>
                <option value="med">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Deadline</label>
              <input class="form-input" id="taskDeadline" type="date" />
            </div>
            <div class="form-group">
              <label class="form-label">Category / Filter</label>
              <select class="form-select" id="taskFilter">
                <option value=""> - - None - -</option>
                <option value="cat_assignment">Assignment</option>
                <option value="cat_personal">Personal Goals</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Sub-Topics / Checklist</label>
            <div class="subtasks-list" id="subtasksList"></div>
            <div class="add-subtask-row">
              <input
                class="form-input"
                id="newSubtaskInput"
                placeholder="Add a sub-topic…"
                onkeydown="
                  if (event.key === 'Enter') {
                    addSubtask();
                    event.preventDefault();
                  }
                "
              />
              <button class="btn btn-secondary" onclick="addSubtask()">
                Add
              </button>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('taskModal')">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveTask()">
            💾 Save Task
          </button>
        </div>
      </div>
    </div>

    <div class="overlay" id="detailModal" style="display: none" onclick="closeModalOnOverlay(event, 'detailModal')" >
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <span class="modal-title" id="detailTitle">Task Details</span>
        </div>
        <div class="modal-body" id="detailBody"></div>
        <div class="modal-footer">
          <button class="btn btn-danger" id="detailDeleteBtn">Delete</button>
          <button class="btn btn-secondary" onclick="closeModal('detailModal')">
            Close
          </button>
          <button class="btn btn-primary" id="detailEditBtn">Edit</button>
        </div>
      </div>
    </div>

    <div class="overlay" id="filtersModal" style="display: none" onclick="closeModalOnOverlay(event, 'filtersModal')" >
      <div class="modal" style="max-width: 400px" onclick="event.stopPropagation()" >
        <div class="modal-header">
          <span class="modal-title">Add Your Filters</span>
          <button class="modal-close" onclick="closeModal('filtersModal')">
            Close
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Add New Filter</label>
            <div class="add-subtask-row">
              <input
                class="form-input"
                id="newFilterInput"
                placeholder="Filter name…"
                maxlength="40"
                onkeydown="
                  if (event.key === 'Enter') {
                    addCustomFilter();
                  }
                "
              />
              <button class="btn btn-primary" onclick="addCustomFilter()">
                Add
              </button>
            </div>
          </div>
          <div class="detail-section-title">Custom Filters</div>
          <div id="manageFiltersList"></div>
        </div>
      </div>
    </div>

    <div class="overlay" id="confirmModal" style="display: none" onclick="closeModalOnOverlay(event, 'confirmModal')" >
      <div class="modal" style="max-width: 360px" onclick="event.stopPropagation()" >
        <div class="modal-header">
          <span class="modal-title">Confirm Delete</span>
        </div>
        <div class="modal-body">
          <p style="color: var(--text2); line-height: 1.6">
            Are you sure you want to delete this task?
          </p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('confirmModal')" >
            Cancel
          </button>
          <button class="btn btn-danger" id="confirmDeleteBtn">
            Delete
          </button>
        </div>
      </div>
    </div>

    <script src="project.js"></script>

  </body>

</html>
